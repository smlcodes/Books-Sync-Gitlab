<div class="card">
  <div class="card-body">
    <div class="col-10 mx-auto">
      <h2 class="text-center">Employees List</h2>
      <!-- <p> {{employeeList[0].name}}</p> -->
    </div>
    <br />
    <div class="row">
      <div class="col-10 mx-auto">
        <table id="example" class="table table-striped table-bordered" style="width: 100%">
          <thead>
            <tr>
              <th scope="col">ID</th>
              <th scope="col">Name</th>
              <th scope="col">Address</th>
              <th scope="col">Salary</th>
              <th scope="col">Action</th>
            </tr>
          </thead>
          <tbody>

            <tr *ngFor="let employee of employeeList">
              <td> {{employee.id}} </td>
              <td> {{employee.name}} </td>
              <td> {{employee.address}} </td>
              <td> {{employee.salary}} </td>
              <td>

                <a href="/view/{{employee.id}}" class="btn btn-primary"> <i class="fas fa-eye"></i> </a> <span>&nbsp;</span>
                <a href="/update/{{employee.id}}" class="btn btn-warning"><i class="fas fa-edit"></i> </a> <span>&nbsp;</span>
                <a href="/delete/{{employee.id}}"  class="btn btn-danger"><i class="fas fa-trash-alt"></i> </a>

              </td>
            </tr>

          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
